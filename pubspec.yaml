name: kisa
description: KiSA - Shaxsiy moliyaviy boshqaruv ilovasi (to'liq offline, lokal)

publish_to: 'none'
version: 2.0.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Lokal ma'lumotlar bazasi (Web + Mobile + Desktop) — to'liq offline
  hive_flutter: ^1.1.0

  # Grafik
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3

  # Shrift (Inter)
  google_fonts: ^6.2.1

  # Sozlamalar
  shared_preferences: ^2.3.1

  # Valyuta kursi (Markaziy bank API)
  http: ^1.2.2

  # Tashqi havolalarni ochish (maxfiylik siyosati)
  url_launcher: ^6.3.0

  # Ma'lumot eksport/zaxira (CSV ulashish)
  share_plus: ^9.0.0
  path_provider: ^2.1.4

  # Xavfsizlik (PIN hash + biometrik qulf)
  crypto: ^3.0.5
  local_auth: ^2.3.0

  # Kunlik eslatma (lokal bildirishnoma)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Ilova ikonkasi — barcha platformalar uchun
flutter_launcher_icons:
  image_path: "assets/icon/kisa-1024.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/kisa-1024.png"
    background_color: "#099268"
    theme_color: "#099268"
  windows:
    generate: true
    image_path: "assets/icon/kisa-1024.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/kisa-1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
