name: kisa
description: KiSA - Shaxsiy moliyaviy boshqaruv ilovasi (SQLite + Firebase)

publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Lokal ma'lumotlar bazasi (Web + Mobile + Desktop)
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.2.1

  # Internet holati
  connectivity_plus: ^6.0.3

  # Grafik
  fl_chart: ^0.69.0

  # Sozlamalar
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Ilova ikonkasi — barcha platformalar uchun
flutter_launcher_icons:
  image_path: "assets/icon/kisa_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#4263EB"
  adaptive_icon_foreground: "assets/icon/kisa_icon_fg.png"
  web:
    generate: true
    image_path: "assets/icon/kisa_icon.png"
    background_color: "#4263EB"
    theme_color: "#4263EB"
  windows:
    generate: true
    image_path: "assets/icon/kisa_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/kisa_icon.png"

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
